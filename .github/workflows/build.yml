name: Build Test

on:
  pull_request:
    branches:
      - dev

jobs:
  Build:
    runs-on: macos-15

    steps:
      # 저장소의 코드를 체크아웃
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Write Config.xcconfig
        run: |
          echo "GPT_API_KEY=$GPT_API_KEY" >> GimiFeedback/GimiFeedback/App/Config.xcconfig
          echo "KAKAO_NATIVE_APP_KEY=$KAKAO_NATIVE_APP_KEY" >> GimiFeedback/GimiFeedback/App/Config.xcconfig
          echo "NOTIFICATION_KEY=$NOTIFICATION_KEY" >> GimiFeedback/GimiFeedback/App/Config.xcconfig
        env:
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
          NOTIFICATION_KEY: ${{ secrets.NOTIFICATION_KEY }}

      - name: Decrypt GoogleService-Info.plist
        run: |
          echo "::add-mask::${GOOGLE_SERVICE_INFO_PWD}"
          gpg -d -o GimiFeedback/GimiFeedback/App/GoogleService-Info.plist \
            --pinentry-mode=loopback \
            --passphrase "$GOOGLE_SERVICE_INFO_PWD" \
            .github/secrets/GoogleService-Info.plist.gpg
          chmod 600 GimiFeedback/GimiFeedback/App/GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PWD: ${{ secrets.GOOGLE_SERVICE_INFO_PWD }}

      - name: Start xcode build 🛠
        run: |
          xcodebuild \
            -project GimiFeedback/GimiFeedback.xcodeproj \
            -scheme GimiFeedback \
            -sdk iphonesimulator \
            -skipPackagePluginValidation \
            clean build