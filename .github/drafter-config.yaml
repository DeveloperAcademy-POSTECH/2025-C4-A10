name-template: 'v$RESOLVED_VERSION 🌈'
tag-template: 'v$RESOLVED_VERSION'
commitish: main
categories:
  - title: '🚀 Features'
    labels:
      - '⚒️ Feature'
      - '🤖 AI'
      - '🪠 Refactor'
  - title: '🐛 Bug Fixes'
    labels:
      - '🪚 Fix'
      - 'bugfix'
      - 'bug'
  - title: '📜 Docs'
    label: '📜 docs'
  - title: '🎨 Design'
    labels:
      - '🎨 Design'
      - '✏️ Style'
  - title: '🧰 Maintenance'
    label: '⚙️ chore'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
template: |
  ## Changes

  $CHANGES