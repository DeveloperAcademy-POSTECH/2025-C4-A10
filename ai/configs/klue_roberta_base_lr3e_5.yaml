wandb:
    entity: natural-beauty
    project: sentiment-analysis
    group: model-search
    experiment: klue/roberta-base-lr3e-5-baselineData
    use_wandb: True # trainer에서 wandb를 사용할지 안할지
    online: True # 온라인으로 할지 오프라인으로 할지

save_dir: results
do_test: True
model: klue/roberta-base
organization: natural-beauty
dataset: spicy-4class-sequence-classification-dataset
only_test: null # 훈련을 하지 않고 테스트만 할 때 모델의 로컬 경로를 넣어주세요.

train:
    optimizer: AdamW
    train_batch_size: 1
    val_batch_size: 1
    test_batch_size: 1
    max_epoch: 3
    learning_rate: 3e-5 # 1e-5 ~ 4e-5
    max_length: 512
    seed: 42